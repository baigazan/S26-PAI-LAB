<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Information Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏨 Hotel Information Chatbot</h1>
            <p>Ask me about rooms, prices, amenities, and booking!</p>
        </div>
        <div class="chat-container">
            <div id="chat-box" class="chat-box">
                <div class="message bot-message">
                    <div class="message-content">Hello! I'm your hotel assistant. How can I help you today?</div>
                </div>
            </div>
            <div id="typing-indicator" class="typing-indicator" style="display: none;">
                <span>Bot is typing...</span>
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Type your question here..." />
            <button id="send-button">Send</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
